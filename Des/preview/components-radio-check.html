<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--pm-bg);color:var(--pm-fg-1);font-family:var(--pm-font-body)}
  .wrap{padding:24px 32px;display:flex;flex-direction:column;gap:16px}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .radio{padding:12px 18px;border-radius:999px;background:var(--pm-bg-elev-2);border:1px solid var(--pm-line-2);font-size:14px;font-weight:500;cursor:pointer;transition:all .16s var(--pm-ease-out);color:var(--pm-fg-2)}
  .radio.sel{background:rgba(255,107,53,0.15);border-color:var(--pm-orange);color:var(--pm-fg-1)}
  .check{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:14px;border:1px solid var(--pm-line-2);background:var(--pm-bg-elev-1);cursor:pointer;font-size:14px}
  .box{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--pm-line-3);display:grid;place-items:center}
  .check.sel .box{background:var(--pm-orange);border-color:var(--pm-orange)}
  .check.sel .box::after{content:"✓";color:#1a0d05;font-size:12px;font-weight:800}
</style></head>
<body><div class="wrap">
  <div class="row">
    <div class="radio">Поп</div>
    <div class="radio sel">Рэп</div>
    <div class="radio">Романтика</div>
    <div class="radio">Весёлая</div>
  </div>
  <div class="row">
    <div class="check sel"><div class="box"></div>Согласен с офертой</div>
    <div class="check"><div class="box"></div>Подписаться на новости</div>
  </div>
</div></body></html>
