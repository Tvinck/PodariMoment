<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--pm-bg);color:var(--pm-fg-1);font-family:var(--pm-font-body)}
  .wrap{padding:32px;display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
  .sw{display:flex;flex-direction:column;gap:10px}
  .chip{height:60px;border-radius:14px;border:1px solid var(--pm-line-2)}
  .name{font-size:13px;font-weight:600;color:var(--pm-fg-1)}
  .hex{font-family:var(--pm-font-mono);font-size:11px;color:var(--pm-fg-3)}
</style></head>
<body><div class="wrap">
  <div class="sw"><div class="chip" style="background:#ff6b35"></div><div class="name">Orange · Primary</div><div class="hex">#ff6b35 · --pm-orange</div></div>
  <div class="sw"><div class="chip" style="background:#ffd166"></div><div class="name">Gold · Secondary</div><div class="hex">#ffd166 · --pm-gold</div></div>
  <div class="sw"><div class="chip" style="background:linear-gradient(135deg,#ff6b35,#ffd166)"></div><div class="name">Flame Gradient</div><div class="hex">--pm-grad-flame</div></div>
  <div class="sw"><div class="chip" style="background:radial-gradient(60% 60% at 50% 50%,rgba(255,107,53,0.45),rgba(255,107,53,0)),#0a0a0f"></div><div class="name">Ember Glow</div><div class="hex">--pm-grad-ember</div></div>
</div></body></html>
