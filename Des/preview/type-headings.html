<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--pm-bg);color:var(--pm-fg-1);font-family:var(--pm-font-body)}
  .wrap{padding:28px 32px;display:grid;grid-template-columns:auto 1fr;gap:8px 24px;align-items:baseline}
  .lab{color:var(--pm-fg-3);font-size:11px;letter-spacing:0.18em;text-transform:uppercase}
  .h1{font-family:var(--pm-font-display);font-weight:700;font-size:42px;line-height:1.05;letter-spacing:-0.02em}
  .h2{font-family:var(--pm-font-display);font-weight:600;font-size:30px;line-height:1.15}
  .h3{font-family:var(--pm-font-display);font-weight:600;font-size:22px;line-height:1.2}
  .h4{font-family:var(--pm-font-body);font-weight:700;font-size:18px;letter-spacing:-0.01em}
</style></head>
<body><div class="wrap">
  <div class="lab">H1 · 72/40</div><div class="h1">Подарите момент</div>
  <div class="lab">H2 · 52/32</div><div class="h2">Как это работает</div>
  <div class="lab">H3 · 28</div><div class="h3">ИИ-песня на заказ</div>
  <div class="lab">H4 · 22</div><div class="h4">Готово за 5 минут</div>
</div></body></html>
