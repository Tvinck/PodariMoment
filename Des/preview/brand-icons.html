<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--pm-bg);color:var(--pm-fg-1);font-family:var(--pm-font-body)}
  .wrap{padding:32px;display:grid;grid-template-columns:repeat(6,1fr);gap:20px;place-items:center}
  .icn{width:32px;height:32px;color:var(--pm-fg-1)}
  .lab{font-size:10px;color:var(--pm-fg-3);letter-spacing:0.1em}
  .cell{display:flex;flex-direction:column;align-items:center;gap:8px}
  .gold{color:var(--pm-gold)}
  .orange{color:var(--pm-orange)}
</style></head>
<body><div class="wrap">
  <div class="cell"><svg class="icn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg><div class="lab">music</div></div>
  <div class="cell"><svg class="icn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg><div class="lab">video</div></div>
  <div class="cell"><svg class="icn gold" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2 L13.5 10.5 L22 12 L13.5 13.5 L12 22 L10.5 13.5 L2 12 L10.5 10.5 Z"/></svg><div class="lab">sparkle</div></div>
  <div class="cell"><svg class="icn orange" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5 L4 19l5 1 1 5 4.5-4.5"/><path d="M14 4l6 6"/><path d="M5 21l-2-2"/><path d="M21 3l-9 9 6 6 9-9z"/></svg><div class="lab">gift</div></div>
  <div class="cell"><svg class="icn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><div class="lab">message</div></div>

  <div class="cell"><svg class="icn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><div class="lab">mail</div></div>

  <div class="cell"><svg class="icn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg><div class="lab">chat</div></div>
  <div class="cell"><svg class="icn orange" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2 C13 6 16 8 16 12 C16 14 14.5 15 13 15 C13 13 12 12 11 11 C11 13 9 14 9 16 C9 19 11 22 12 22 C16 22 19 18.5 19 14.5 C19 9 14 7 12 2 Z"/></svg><div class="lab">flame</div></div>

</div></body></html>
