<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0a0a0f;color:#fff;font-family:var(--pm-font-bold);overflow:hidden}
  .wrap{padding:18px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .card{position:relative;border-radius:28px;padding:22px;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden;min-height:240px;cursor:pointer;transition:transform .35s var(--pm-ease-spring)}
  .card:hover{transform:translateY(-6px) rotate(-1deg)}
  .c-peach{background:#ffd9c2;color:#1a0d05}
  .c-lilac{background:#d4c8ff;color:#1f1145}
  .lab{font-family:var(--pm-font-bold);font-size:12px;font-weight:700;letter-spacing:0.06em;opacity:0.7;position:relative;z-index:3;text-transform:lowercase}
  h3{font-family:var(--pm-font-bold);font-size:30px;line-height:0.95;margin:0;font-weight:800;letter-spacing:-0.04em;position:relative;z-index:3}
  p{margin:0;font-size:14px;line-height:1.4;font-weight:500;opacity:0.75;position:relative;z-index:3;max-width:60%}
  .price{position:absolute;bottom:22px;right:22px;background:#0a0a0f;color:#fff;font-weight:800;padding:10px 18px;border-radius:999px;font-size:15px;font-family:var(--pm-font-bold);z-index:5;letter-spacing:-0.02em}

  /* 3D ART — peach card: gift with flying notes */
  .art1{position:absolute;inset:0;z-index:2;pointer-events:none}
  .blob1{position:absolute;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#ff6b35,#c026d3);bottom:-40px;right:-30px;box-shadow:inset -20px -20px 40px rgba(0,0,0,0.3),inset 20px 20px 40px rgba(255,255,255,0.4);animation:float1 4s ease-in-out infinite}
  .gift{position:absolute;bottom:30px;right:30px;width:90px;height:90px;border-radius:18px;background:linear-gradient(135deg,#ff8458,#e25420);box-shadow:0 12px 30px rgba(0,0,0,0.3),inset 0 -8px 0 rgba(0,0,0,0.15),inset 0 8px 0 rgba(255,255,255,0.25);animation:bob 3s ease-in-out infinite;z-index:3}
  .gift::before{content:"";position:absolute;left:50%;top:0;width:14px;height:100%;background:#ffd166;transform:translateX(-50%);box-shadow:inset 0 0 0 1px rgba(0,0,0,0.1)}
  .gift::after{content:"";position:absolute;top:-12px;left:50%;width:36px;height:24px;background:#ffd166;border-radius:50% 50% 0 0;transform:translateX(-50%)}
  .note{position:absolute;font-size:32px;color:#ff6b35;font-weight:900;animation:rise 4s ease-in-out infinite}
  .n1{top:30%;right:50%}
  .n2{top:15%;right:35%;animation-delay:0.8s;font-size:24px}
  .n3{top:45%;right:20%;animation-delay:1.6s;font-size:20px}

  /* lilac card: 3D play button */
  .play{position:absolute;bottom:20px;right:20px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#a78bfa,#6d28d9);box-shadow:0 16px 40px rgba(109,40,217,0.5),inset -12px -12px 30px rgba(0,0,0,0.3),inset 12px 12px 30px rgba(255,255,255,0.35);display:grid;place-items:center;animation:pulse 3s ease-in-out infinite;z-index:3}
  .play::after{content:"";width:0;height:0;border-left:32px solid #fff;border-top:22px solid transparent;border-bottom:22px solid transparent;margin-left:8px;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.3))}
  .ring{position:absolute;border:3px solid rgba(109,40,217,0.4);border-radius:50%;animation:ringExpand 2.5s ease-out infinite}
  .r1{width:140px;height:140px;bottom:10px;right:10px}
  .r2{width:160px;height:160px;bottom:0;right:0;animation-delay:0.5s}

  @keyframes float1{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-8px) rotate(5deg)}}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-12px) rotate(3deg)}}
  @keyframes rise{0%{transform:translateY(0);opacity:0}30%{opacity:1}100%{transform:translateY(-40px);opacity:0}}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
  @keyframes ringExpand{0%{transform:scale(0.7);opacity:1}100%{transform:scale(1.3);opacity:0}}
</style></head>
<body><div class="wrap">
  <div class="card c-peach">
    <div class="art1">
      <div class="blob1"></div>
      <div class="gift"></div>
      <div class="note n1">♪</div>
      <div class="note n2">♫</div>
      <div class="note n3">♪</div>
    </div>
    <div>
      <div class="lab">песня</div>
      <h3>ИИ-песня<br>на заказ</h3>
    </div>
    <p>Текст, голос и бит — про вашего человека</p>
    <div class="price">299 ₽</div>
  </div>
  <div class="card c-lilac">
    <div class="ring r1"></div>
    <div class="ring r2"></div>
    <div class="play"></div>
    <div>
      <div class="lab">видео</div>
      <h3>Видео из<br>ваших фото</h3>
    </div>
    <p>До 15 кадров под музыку. MP4 на email</p>
    <div class="price">499 ₽</div>
  </div>
</div></body></html>
