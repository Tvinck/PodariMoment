<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--pm-bg);color:var(--pm-fg-1);font-family:var(--pm-font-body)}
  .wrap{padding:24px 32px;display:flex;align-items:flex-end;gap:18px}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{background:#1a1a26;border:1px dashed var(--pm-line-2);border-radius:6px}
  .lab{font-family:var(--pm-font-mono);font-size:11px;color:var(--pm-fg-3)}
  .val{font-size:11px;color:var(--pm-fg-1);font-weight:600}
</style></head>
<body><div class="wrap">
  <div class="col"><div class="box" style="width:4px;height:4px"></div><div class="lab">s-1</div><div class="val">4</div></div>
  <div class="col"><div class="box" style="width:8px;height:8px"></div><div class="lab">s-2</div><div class="val">8</div></div>
  <div class="col"><div class="box" style="width:12px;height:12px"></div><div class="lab">s-3</div><div class="val">12</div></div>
  <div class="col"><div class="box" style="width:16px;height:16px"></div><div class="lab">s-4</div><div class="val">16</div></div>
  <div class="col"><div class="box" style="width:24px;height:24px"></div><div class="lab">s-5</div><div class="val">24</div></div>
  <div class="col"><div class="box" style="width:32px;height:32px"></div><div class="lab">s-6</div><div class="val">32</div></div>
  <div class="col"><div class="box" style="width:48px;height:48px"></div><div class="lab">s-7</div><div class="val">48</div></div>
  <div class="col"><div class="box" style="width:64px;height:64px"></div><div class="lab">s-8</div><div class="val">64</div></div>
  <div class="col"><div class="box" style="width:96px;height:96px"></div><div class="lab">s-9</div><div class="val">96</div></div>
</div></body></html>
