<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--pm-bg);color:var(--pm-fg-1);font-family:var(--pm-font-body)}
  .wrap{padding:32px;display:flex;flex-direction:column;gap:18px}
  .specimen{font-family:var(--pm-font-display);font-weight:700;font-size:88px;line-height:1;letter-spacing:-0.02em}
  .specimen .it{font-style:italic;font-weight:500;background:var(--pm-grad-flame);-webkit-background-clip:text;background-clip:text;color:transparent}
  .meta{display:flex;gap:24px;color:var(--pm-fg-3);font-size:12px;letter-spacing:0.18em;text-transform:uppercase}
  .meta b{color:var(--pm-fg-1);font-weight:600;letter-spacing:0.18em}
</style></head>
<body><div class="wrap">
  <div class="specimen">Подарите <span class="it">момент</span></div>
  <div class="meta"><span><b>Playfair Display</b></span><span>700 / 500 italic</span><span>88 / 1.0 / -0.02em</span></div>
</div></body></html>
