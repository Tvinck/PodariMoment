<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--pm-bg);color:var(--pm-fg-1);font-family:var(--pm-font-body)}
  .wrap{padding:32px;display:grid;grid-template-columns:repeat(4,1fr);gap:24px;place-items:center}
  .col{display:flex;flex-direction:column;align-items:center;gap:14px}
  .card{width:96px;height:64px;background:#1a1a26;border:1px solid var(--pm-line-2);border-radius:14px}
  .lab{font-family:var(--pm-font-mono);font-size:10px;color:var(--pm-fg-3)}
  .val{font-size:11px;font-weight:600}
</style></head>
<body><div class="wrap">
  <div class="col"><div class="card" style="box-shadow:var(--pm-shadow-sm)"></div><div class="lab">shadow-sm</div><div class="val">subtle</div></div>
  <div class="col"><div class="card" style="box-shadow:var(--pm-shadow-md)"></div><div class="lab">shadow-md</div><div class="val">card lift</div></div>
  <div class="col"><div class="card" style="box-shadow:var(--pm-shadow-lg)"></div><div class="lab">shadow-lg</div><div class="val">modal</div></div>
  <div class="col"><div class="card" style="box-shadow:var(--pm-shadow-glow)"></div><div class="lab">shadow-glow</div><div class="val">flame halo</div></div>
</div></body></html>
