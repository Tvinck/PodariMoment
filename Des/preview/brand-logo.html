<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--pm-bg);color:var(--pm-fg-1);font-family:var(--pm-font-body)}
  .wrap{padding:32px;display:flex;align-items:center;gap:18px}
  .logo-mark{width:64px;height:64px;border-radius:50%;background:var(--pm-grad-flame);display:grid;place-items:center;color:#0a0a0f;font-family:var(--pm-font-display);font-weight:800;font-size:36px}
  .logo-row{display:flex;align-items:center;gap:14px;padding:16px 20px;border-radius:16px;background:var(--pm-bg-elev-1);border:1px solid var(--pm-line-2)}
  .logo-text{font-family:var(--pm-font-display);font-weight:700;font-size:22px;letter-spacing:-0.01em}
  .logo-text em{font-style:italic;font-weight:500;background:var(--pm-grad-flame);-webkit-background-clip:text;background-clip:text;color:transparent}
  .small{width:32px;height:32px;border-radius:50%;background:var(--pm-grad-flame);display:grid;place-items:center;color:#0a0a0f;font-family:var(--pm-font-display);font-weight:800;font-size:18px}
</style></head>
<body><div class="wrap">
  <div class="logo-mark">П</div>
  <div class="logo-row"><div class="small">П</div><div class="logo-text">Подари<em>Момент</em></div></div>
</div></body></html>
