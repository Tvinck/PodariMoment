<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--pm-bg);color:var(--pm-fg-1);font-family:var(--pm-font-body)}
  .wrap{padding:24px 32px;display:flex;flex-direction:column;gap:8px}
  .row{display:grid;grid-template-columns:80px 1fr auto;gap:16px;align-items:center;padding:8px 12px;border-radius:10px;background:var(--pm-bg-elev-1)}
  .chip{height:36px;border-radius:8px;border:1px solid var(--pm-line-2)}
  .name{font-size:13px;font-weight:600}
  .hex{font-family:var(--pm-font-mono);font-size:11px;color:var(--pm-fg-3)}
</style></head>
<body><div class="wrap">
  <div class="row"><div class="chip" style="background:#0a0a0f"></div><div class="name">Background</div><div class="hex">#0a0a0f</div></div>
  <div class="row"><div class="chip" style="background:#14141f"></div><div class="name">Elev 1 · Nav</div><div class="hex">#14141f</div></div>
  <div class="row"><div class="chip" style="background:#1a1a26"></div><div class="name">Elev 2 · Card</div><div class="hex">#1a1a26</div></div>
  <div class="row"><div class="chip" style="background:#232333"></div><div class="name">Elev 3 · Hover</div><div class="hex">#232333</div></div>
  <div class="row"><div class="chip" style="background:#07070b"></div><div class="name">Inset · Input</div><div class="hex">#07070b</div></div>
</div></body></html>
